version: "3.8"

services:
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8889:8889"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8889/actuator/health"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 20s
    networks:
      - microservices-net

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"]
      interval: 5s
      retries: 5
      timeout: 3s
      start_period: 15s
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - microservices-net

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-net

  medecins-service:
    build: ./medecins-service
    container_name: medecins-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medecins_db
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - microservices-net

  patient-service:
    build: ./patient-service
    container_name: patient-service
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patients_db
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - microservices-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8888:8888"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      medecins-service:
        condition: service_started
      patient-service:
        condition: service_started
    networks:
      - microservices-net

  frontend:
    build: ./FRONTEND
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - microservices-net

volumes:
  postgres_data:

networks:
  microservices-net:
    driver: bridge